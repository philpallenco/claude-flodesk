name: Weekly Flodesk Report

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00am UTC
  workflow_dispatch:        # Allow manual runs from the Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit history back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLODESK_API_KEY:   ${{ secrets.FLODESK_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/weekly-report.js

      - name: Commit updated history
        run: |
          git config user.name "Flodesk Report Bot"
          git config user.email "noreply@github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "chore: weekly subscriber snapshot $(date +%Y-%m-%d)"
          git push origin HEAD
